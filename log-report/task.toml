artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Everyday text processing: read a small access log, count lines and distinct IPs, and pick the most frequent path. No tricky algorithms or edge cases in the provided data."
solution_explanation = "Read /app/access.log line by line, count non-empty lines as total_requests, collect the first whitespace field of each line into a set for unique_ips, extract the request path from the quoted request and tally counts to find top_path, then write the three fields as a JSON object to /app/report.json."
verification_explanation = "The verifier loads /app/report.json and asserts the exact expected values for the provided log: total_requests == 6, unique_ips == 3, and top_path == \"/index.html\". A file that merely exists or is non-empty is not enough, so the no-op agent scores 0 while the oracle scores 1."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
